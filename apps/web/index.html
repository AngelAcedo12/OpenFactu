    <!-- CSS crítico inline: se aplica antes de que Vite inyecte los stylesheets -->
    <style>
      html { color-scheme: light; background: #FAFBFC; }
      html.dark { color-scheme: dark; background: #0A1628; }
      body { margin: 0; background: inherit; color: #0A1628; font-family: 'DM Sans', system-ui, sans-serif; }
      html.dark body { color: #E2E8F0; }
    </style>

    <!-- Aplicar tema antes de montar React para evitar FOUC -->
    <script>
      (function () {
        try {
          var cached = localStorage.getItem('openfactu_theme');
          if (cached) {
            var parsed = JSON.parse(cached);
            if (parsed && parsed.themeMode === 'dark') {
              document.documentElement.classList.add('dark');
            }
            if (parsed && parsed.colorPrimaryRgb) {
              document.documentElement.style.setProperty('--color-primary-rgb', parsed.colorPrimaryRgb);
            }
            if (parsed && parsed.colorPrimaryHoverRgb) {
              document.documentElement.style.setProperty('--color-primary-hover-rgb', parsed.colorPrimaryHoverRgb);
            }
            if (parsed && parsed.colorPrimaryFgRgb) {
              document.documentElement.style.setProperty('--color-primary-fg-rgb', parsed.colorPrimaryFgRgb);
            }
            if (parsed && parsed.colorAccentRgb) {
              document.documentElement.style.setProperty('--color-accent-rgb', parsed.colorAccentRgb);
            }
            if (parsed && parsed.colorAccentFgRgb) {
              document.documentElement.style.setProperty('--color-accent-fg-rgb', parsed.colorAccentFgRgb);
            }
            if (parsed && parsed.appName) {
              document.title = parsed.appName;
            }
          }
        } catch (e) { /* noop */ }
      })();
    </script>

    <!-- Import Map para Plugins Dinámicos -->
    <script type="importmap">
